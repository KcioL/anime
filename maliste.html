<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Liste d'Animes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
        <h1>Ma Liste Personnelle</h1>
        <p>Les animes que j'ai regardés et notés</p>
        
        <nav class="top-nav">
            <a href="index.html" class="nav-btn">⬅ Retour au Calendrier</a>
        </nav>
    </header>

    <main>
        <div class="controls" style="margin-bottom: 30px;">
            <div class="filter-group">
                <label for="search-mylist">Rechercher :</label>
                <input type="text" id="search-mylist" placeholder="Titre de l'anime..." style="padding: 10px; border-radius: 5px; border: 1px solid #f47521; background-color: #121212; color: white; outline: none; min-width: 200px; font-size: 0.95rem;">
            </div>

            <div class="filter-group">
                <label for="sort-mylist">Trier par :</label>
                <select id="sort-mylist">
                    <option value="default">Ordre d'ajout (Par défaut)</option>
                    <option value="desc">Meilleures notes d'abord</option>
                    <option value="asc">Moins bonnes notes d'abord</option>
                </select>
            </div>
        </div>

        <div id="mylist-container" class="grid-container">
            </div>
    </main>
    <script src="maliste.js"></script>
</body>
</html>
